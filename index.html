<script>
// Inline fuzzy fallback if CDN fails
(function() {
  function installFallback() {
    if (window.Fuse) return;
    window.Fuse = function(list, opts) {
      const key = opts && opts.keys && opts.keys[0];
      this.search = function(query) {
        if (!query) return list.slice(0, 8).map(item => ({ item }));
        const q = query.toLowerCase();
        return list
          .filter(item => { const v = (key ? item[key] : item) || ''; return v.toLowerCase().includes(q); })
          .sort((a, b) => {
            const av = (key ? a[key] : a) || '';
            const bv = (key ? b[key] : b) || '';
            return av.toLowerCase().indexOf(q) - bv.toLowerCase().indexOf(q);
          })
          .slice(0, 8)
          .map(item => ({ item }));
      };
    };
  }
  // Try after load
  window.addEventListener('load', installFallback);
  // Also catch script error
  window.addEventListener('error', function(e) {
    if (e.target && e.target.src && e.target.src.includes('fuse')) installFallback();
  }, true);
})();

  { name:"Quirky",  inc:null,       dec:null },
];

const IV_STATS = ["HP","Atk","Def","SpA","SpD","Spe"];

const EMPTY_MON = {
  species:"", level:50, ability:"", nature:"Hardy", heldItem:"",
  ivs:{ HP:31, Atk:31, Def:31, SpA:31, SpD:31, Spe:31 },
  moves:["","","",""],
};

const cap = s => s ? s.charAt(0).toUpperCase() + s.slice(1).replace(/-/g,' ') : '';
const titleCase = s => s ? s.replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase()) : '';

function toShowdown(mon) {
  if (!mon || !mon.species) return '';
  const lines = [];
  let line1 = cap(mon.species);
  if (mon.heldItem) line1 += ` @ ${cap(mon.heldItem)}`;
  lines.push(line1);
  if (mon.ability) lines.push(`Ability: ${titleCase(mon.ability)}`);
  lines.push(`Level: ${mon.level}`);
  lines.push(`${mon.nature} Nature`);
  const ivLine = IV_STATS.filter(s => mon.ivs[s] !== 31).map(s => `${mon.ivs[s]} ${s}`).join(' / ');
  if (ivLine) lines.push(`IVs: ${ivLine}`);
  mon.moves.filter(Boolean).forEach(m => lines.push(`- ${titleCase(m)}`));
  return lines.join('\n');
}

// ── API cache ──────────────────────────────────────────────
const cache = {};
async function poke(url) {
  if (cache[url]) return cache[url];
  const r = await fetch(url);
  const d = await r.json();
  cache[url] = d;
  return d;
}

// ── Description fetcher ───────────────────────────────────
// Fetches and caches ability/item flavor text from PokéAPI
const descCache = {};
async function fetchDesc(type, name) {
  if (!name) return '';
  const key = `${type}:${name}`;
  if (descCache[key] !== undefined) return descCache[key];
  descCache[key] = ''; // prevent duplicate fetches
  try {
    const d = await poke(`https://pokeapi.co/api/v2/${type}/${name}`);
    let text = '';
    if (type === 'ability') {
      const entry = (d.flavor_text_entries || []).find(e => e.language.name === 'en');
      text = entry ? entry.flavor_text.replace(/\f/g,' ').replace(/\n/g,' ') : '';
    } else if (type === 'item') {
      const entry = (d.flavor_text_entries || []).find(e => e.language.name === 'en');
      text = entry ? entry.text.replace(/\f/g,' ').replace(/\n/g,' ') : '';
    }
    descCache[key] = text;
    return text;
  } catch { return ''; }
}

function usePokeDesc(type, name) {
  const [desc, setDesc] = useState('');
  const [loading, setLoading] = useState(false);
  useEffect(() => {
    if (!name) { setDesc(''); return; }
    const key = `${type}:${name}`;
    if (descCache[key]) { setDesc(descCache[key]); return; }
    setLoading(true);
    fetchDesc(type, name).then(t => { setDesc(t); setLoading(false); });
  }, [type, name]);
  return { desc, loading };
}

// ── Autocomplete ───────────────────────────────────────────
function AutoInput({ value, onChange, placeholder, list, loading }) {
  const [q, setQ] = useState(value || '');
  const [open, setOpen] = useState(false);
  const [hi, setHi] = useState(0);
  const wrapRef = useRef();

  const fuse = useMemo(() => {
    if (!list.length || !window.Fuse) return null;
    return new window.Fuse(list, { keys:['name'], threshold:0.4 });
  }, [list]);

  const results = useMemo(() => {
    if (!q) return list.slice(0,8);
    if (fuse) return fuse.search(q).slice(0,8).map(r => r.item);
    const lq = q.toLowerCase();
    return list.filter(i => i.name.toLowerCase().includes(lq)).slice(0,8);
  }, [q, fuse, list]);

  useEffect(() => { setQ(value || ''); }, [value]);

  useEffect(() => {
    const fn = e => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', fn);
    return () => document.removeEventListener('mousedown', fn);
  }, []);

  function pick(item) {
    setQ(item.name);
    onChange(item.name);
    setOpen(false);
  }

  function onKey(e) {
    if (!open) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); setHi(h => Math.min(h+1, results.length-1)); }
    if (e.key === 'ArrowUp')   { e.preventDefault(); setHi(h => Math.max(h-1, 0)); }
    if (e.key === 'Enter')     { e.preventDefault(); if (results[hi]) pick(results[hi]); }
    if (e.key === 'Escape')    { setOpen(false); }
  }

  return (
    <div className="autocomplete-wrap" ref={wrapRef}>
      <input
        className="form-input"
        value={q}
        placeholder={loading ? 'Loading…' : placeholder}
        disabled={loading}
        onChange={e => { setQ(e.target.value); setOpen(true); setHi(0); onChange(''); }}
        onFocus={() => setOpen(true)}
        onKeyDown={onKey}
      />
      {open && results.length > 0 && (
        <div className="autocomplete-dropdown">
          {results.map((item, i) => (
            <div key={item.name} className={`autocomplete-item${i===hi?' hi':''}`} onMouseDown={() => pick(item)}>
              {titleCase(item.name)}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Pokemon Form Modal ─────────────────────────────────────
function PokemonForm({ initial, onSave, onClose }) {
  const [mon, setMon] = useState(() => ({
    ...EMPTY_MON, ...initial,
    ivs: { ...EMPTY_MON.ivs, ...(initial?.ivs || {}) },
    moves: initial?.moves ? [...initial.moves] : ["","","",""],
  }));

  const [abilities, setAbilities] = useState([]);
  const [items, setItems]         = useState([]);
  const [moves, setMoves]         = useState([]);
  const [loading, setLoading]     = useState(true);

  const abilityDesc = usePokeDesc('ability', mon.ability);
  const itemDesc    = usePokeDesc('item',    mon.heldItem);

  useEffect(() => {
    (async () => {
      try {
        const [ab, it, mv] = await Promise.all([
          poke('https://pokeapi.co/api/v2/ability?limit=400'),
          poke('https://pokeapi.co/api/v2/item?limit=2000'),
          poke('https://pokeapi.co/api/v2/move?limit=1000'),
        ]);
        setAbilities((ab.results||[]).map(x=>({name:x.name})));
        setItems((it.results||[]).map(x=>({name:x.name})));
        setMoves((mv.results||[]).map(x=>({name:x.name})));
      } catch(e) { console.error('PokéAPI error:', e); }
      setLoading(false);
    })();
  }, []);

  const set = (k,v) => setMon(m => ({...m,[k]:v}));
  const setIV = (stat, val) => {
    const n = Math.min(31, Math.max(0, parseInt(val)||0));
    setMon(m => ({...m, ivs:{...m.ivs,[stat]:n}}));
  };
  const setMove = (i, v) => setMon(m => {
    const mv = [...m.moves]; mv[i]=v; return {...m,moves:mv};
  });

  const nat = NATURES.find(n => n.name === mon.nature);

  return (
    <div className="modal-overlay" onClick={e => e.target.className==='modal-overlay' && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <span className="modal-title">{initial?.species ? 'EDIT POKÉMON' : 'ADD POKÉMON'}</span>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-grid">

            <div className="form-group">
              <label className="form-label">Species</label>
              <input className="form-input" placeholder="e.g. garchomp"
                value={mon.species}
                onChange={e => set('species', e.target.value.toLowerCase().replace(/\s+/g,'-'))} />
            </div>

            <div className="form-group">
              <label className="form-label">Level</label>
              <input className="form-input" type="number" min={1} max={100}
                value={mon.level}
                onChange={e => set('level', Math.min(100,Math.max(1,parseInt(e.target.value)||1)))} />
            </div>

            <div className="form-group">
              <label className="form-label">
                Ability {loading && <span className="loading-chip"><span className="spin"/>loading</span>}
              </label>
              <AutoInput value={mon.ability} onChange={v=>set('ability',v)}
                placeholder="Search ability…" list={abilities} loading={loading} />
              <div className="field-desc">
                {abilityDesc.loading && <span className="desc-loading">fetching…</span>}
                {!abilityDesc.loading && abilityDesc.desc && <span>{abilityDesc.desc}</span>}
              </div>
            </div>

            <div className="form-group">
              <label className="form-label">
                Held Item {loading && <span className="loading-chip"><span className="spin"/>loading</span>}
              </label>
              <AutoInput value={mon.heldItem} onChange={v=>set('heldItem',v)}
                placeholder="Search item…" list={items} loading={loading} />
              <div className="field-desc">
                {itemDesc.loading && <span className="desc-loading">fetching…</span>}
                {!itemDesc.loading && itemDesc.desc && <span>{itemDesc.desc}</span>}
              </div>
            </div>

            <div className="form-group full">
              <label className="form-label">Nature</label>
              <select className="form-select" value={mon.nature} onChange={e=>set('nature',e.target.value)}>
                {NATURES.map(n=>(
                  <option key={n.name} value={n.name}>
                    {n.name}{n.inc ? ` — +${n.inc} / -${n.dec}` : ' — No stat change'}
                  </option>
                ))}
              </select>
              {nat?.inc && (
                <div className="select-desc">
                  ↑ <strong style={{color:'#4caf50'}}>{nat.inc}</strong>
                  &nbsp;↓ <strong style={{color:'#e3350d'}}>{nat.dec}</strong>
                </div>
              )}
            </div>

            <div className="form-group full">
              <label className="form-label">IVs (0–31)</label>
              <div className="iv-grid">
                {IV_STATS.map(stat=>(
                  <div className="iv-item" key={stat}>
                    <div className="iv-label">{stat}</div>
                    <input className="iv-input" type="number" min={0} max={31}
                      value={mon.ivs[stat]}
                      onChange={e=>setIV(stat,e.target.value)} />
                  </div>
                ))}
              </div>
            </div>

            <div className="form-group full">
              <label className="form-label">
                Moves {loading && <span className="loading-chip"><span className="spin"/>loading</span>}
              </label>
              <div className="moves-grid">
                {[0,1,2,3].map(i=>(
                  <AutoInput key={i} value={mon.moves[i]} onChange={v=>setMove(i,v)}
                    placeholder={`Move ${i+1}…`} list={moves} loading={loading} />
                ))}
              </div>
            </div>

          </div>
        </div>
        <div className="modal-footer">
          <button className="btn-cancel" onClick={onClose}>Cancel</button>
          <button className="btn-save" onClick={()=>onSave(mon)} disabled={!mon.species.trim()}>
            Save Pokémon
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Sprite helper ──────────────────────────────────────────
// Showdown's sprite CDN accepts lowercase hyphenated names directly
function spriteUrl(species) {
  if (!species) return null;
  const s = species.toLowerCase().replace(/\s+/g,'-');
  return `https://play.pokemonshowdown.com/sprites/ani/${s}.gif`;
}
function spriteFallback(e, species) {
  // gif failed → try static png from PokeAPI official artwork path via species name lookup
  const s = species.toLowerCase().replace(/\s+/g,'-');
  if (!e.target.dataset.fallback) {
    e.target.dataset.fallback = '1';
    e.target.src = `https://play.pokemonshowdown.com/sprites/gen5/${s}.png`;
  } else {
    e.target.style.opacity = '0.3';
  }
}

// ── Detail panel (floating) ────────────────────────────────
function DetailPanel({ mon, onClose, onEdit, onRemove }) {
  const nat = NATURES.find(n=>n.name===mon.nature);
  const abilityDesc = usePokeDesc('ability', mon.ability);
  const itemDesc    = usePokeDesc('item',    mon.heldItem);
  return (
    <div className="detail-overlay" onClick={e=>e.target.className==='detail-overlay'&&onClose()}>
      <div className="detail-panel">
        <button className="detail-close" onClick={onClose}>✕</button>
        <div className="detail-hero">
          <img
            className="detail-sprite"
            src={spriteUrl(mon.species)}
            onError={e=>spriteFallback(e,mon.species)}
            alt={mon.species}
          />
          <div className="detail-hero-info">
            <div className="detail-name">{titleCase(mon.species)}</div>
            <div className="detail-level">Level {mon.level}</div>
            <div className="detail-nature">
              {mon.nature} Nature
              {nat?.inc && <span> · <span style={{color:'#4caf50'}}>+{nat.inc}</span> / <span style={{color:'#e3350d'}}>-{nat.dec}</span></span>}
            </div>
          </div>
        </div>

        <div className="detail-body">
          {mon.ability && (
            <div className="detail-row-block">
              <div className="detail-row">
                <span className="dr-label">Ability</span>
                <span className="dr-val">{titleCase(mon.ability)}</span>
              </div>
              {(abilityDesc.loading || abilityDesc.desc) && (
                <div className="detail-desc">
                  {abilityDesc.loading ? <span className="desc-loading">fetching…</span> : abilityDesc.desc}
                </div>
              )}
            </div>
          )}
          {mon.heldItem && (
            <div className="detail-row-block">
              <div className="detail-row">
                <span className="dr-label">Held Item</span>
                <span className="dr-val">{titleCase(mon.heldItem)}</span>
              </div>
              {(itemDesc.loading || itemDesc.desc) && (
                <div className="detail-desc">
                  {itemDesc.loading ? <span className="desc-loading">fetching…</span> : itemDesc.desc}
                </div>
              )}
            </div>
          )}

          <div className="detail-section-title">IVs</div>
          <div className="detail-ivs">
            {IV_STATS.map(s=>(
              <div key={s} className="detail-iv-cell">
                <div className="detail-iv-label">{s}</div>
                <div className={`detail-iv-val${mon.ivs[s]===31?' iv-max':mon.ivs[s]===0?' iv-zero':''}`}>{mon.ivs[s]}</div>
                <div className="detail-iv-bar">
                  <div className="detail-iv-fill" style={{width:`${(mon.ivs[s]/31)*100}%`}}/>
                </div>
              </div>
            ))}
          </div>

          {mon.moves.filter(Boolean).length > 0 && <>
            <div className="detail-section-title">Moves</div>
            <div className="detail-moves">
              {mon.moves.filter(Boolean).map((mv,i)=>(
                <div key={i} className="detail-move">{titleCase(mv)}</div>
              ))}
            </div>
          </>}
        </div>

        <div className="detail-actions">
          <button className="btn-cancel" onClick={onClose}>Close</button>
          <button className="btn-sm" style={{flex:'unset',padding:'8px 18px',fontSize:'13px'}} onClick={onEdit}>Edit</button>
          <button className="btn-sm danger" style={{flex:'unset',padding:'8px 18px',fontSize:'13px'}} onClick={onRemove}>Remove</button>
        </div>
      </div>
    </div>
  );
}

// ── Team slot card ─────────────────────────────────────────
function SlotCard({ mon, idx, onView, onEdit, onRemove }) {
  if (!mon) return (
    <div className="slot-card empty-slot" onClick={()=>onEdit(null,idx)}>
      <div className="empty-plus">+</div>
      <div className="empty-label">Empty Slot</div>
    </div>
  );
  return (
    <div className="slot-card filled" onClick={()=>onView(mon,idx)}>
      <div className="slot-header">
        <img className="slot-sprite"
          src={spriteUrl(mon.species)}
          onError={e=>spriteFallback(e,mon.species)}
          alt={mon.species} />
        <div>
          <div className="slot-name">{titleCase(mon.species)}</div>
          <div className="slot-level">Lv.{mon.level} · {mon.nature}</div>
        </div>
      </div>
      <div className="slot-body">
        {mon.ability  && <div className="slot-detail">Ability: <span>{titleCase(mon.ability)}</span></div>}
        {mon.heldItem && <div className="slot-detail">Item: <span>{titleCase(mon.heldItem)}</span></div>}
        <div className="slot-moves">
          {mon.moves.filter(Boolean).map((mv,i)=>(
            <span key={i} className="move-tag">{titleCase(mv)}</span>
          ))}
        </div>
      </div>
      <div className="slot-actions" onClick={e=>e.stopPropagation()}>
        <button className="btn-sm" onClick={()=>onEdit(mon,idx)}>Edit</button>
        <button className="btn-sm danger" onClick={()=>onRemove(idx)}>Remove</button>
      </div>
    </div>
  );
}

// ── Box mini slot ──────────────────────────────────────────
function MiniSlot({ mon, idx, onView, onEdit, onRemove }) {
  if (!mon) return (
    <div className="box-slot-mini empty-mini" onClick={()=>onEdit(null,idx)} title="Add Pokémon">
      <div className="mini-plus">+</div>
    </div>
  );
  return (
    <div className="box-slot-mini filled"
      title={titleCase(mon.species)}
      onClick={()=>onView(mon,idx)}
      onContextMenu={e=>{e.preventDefault();onRemove(idx);}}>
      <img className="mini-sprite"
        src={spriteUrl(mon.species)}
        onError={e=>spriteFallback(e,mon.species)}
        alt={mon.species} />
      <div className="mini-name">{titleCase(mon.species)}</div>
    </div>
  );
}

// ── Export modal ───────────────────────────────────────────
function ExportModal({ text, onClose }) {
  const [copied, setCopied] = useState(false);
  const copy = () => navigator.clipboard.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});
  return (
    <div className="modal-overlay" onClick={e=>e.target.className==='modal-overlay'&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <span className="modal-title">SHOWDOWN EXPORT</span>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="export-text">{text||'(No Pokémon to export)'}</div>
        </div>
        <div className="modal-footer">
          <button className="btn-cancel" onClick={onClose}>Close</button>
          <button className="btn-copy" onClick={copy}>{copied?'✓ Copied!':'Copy to Clipboard'}</button>
        </div>
      </div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────
const STORAGE_KEY = 'pokebuilder_v2';

function App() {
  const load = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}; } catch{return{};} };

  const [team, setTeam] = useState(()=>{ const d=load(); return d.team||Array(6).fill(null); });
  const [boxes, setBoxes] = useState(()=>{ const d=load(); return d.boxes||[Array(30).fill(null),Array(30).fill(null),Array(30).fill(null)]; });
  const [tab,        setTab]        = useState('team');
  const [editing,    setEditing]    = useState(null); // {mon,idx,ctx}
  const [viewing,    setViewing]    = useState(null); // {mon,idx,ctx}
  const [showExport, setShowExport] = useState(false);
  const [toast,      setToast]      = useState(null);

  useEffect(()=>{ localStorage.setItem(STORAGE_KEY, JSON.stringify({team,boxes})); },[team,boxes]);

  const flash = msg => { setToast(msg); setTimeout(()=>setToast(null),2200); };

  function save(newMon) {
    const {idx,ctx} = editing;
    if (ctx==='team') { setTeam(t=>{ const a=[...t]; a[idx]=newMon; return a; }); }
    else { const bi=parseInt(ctx.slice(3)); setBoxes(b=>{ const nb=b.map(x=>[...x]); nb[bi][idx]=newMon; return nb; }); }
    setEditing(null);
    flash(`${titleCase(newMon.species)} saved!`);
  }

  function remove(idx, ctx) {
    if (ctx==='team') { setTeam(t=>{ const a=[...t]; a[idx]=null; return a; }); }
    else { const bi=parseInt(ctx.slice(3)); setBoxes(b=>{ const nb=b.map(x=>[...x]); nb[bi][idx]=null; return nb; }); }
    setViewing(null);
    flash('Pokémon removed');
  }

  function exportText() {
    const mons = tab==='team' ? team.filter(Boolean) : boxes[parseInt(tab.slice(3))].filter(Boolean);
    return mons.map(toShowdown).join('\n\n');
  }

  const boxIdx = tab.startsWith('box') ? parseInt(tab.slice(3)) : null;

  return (
    <>
      <div className="app-header">
        <div className="header-inner">
          <svg width="48" height="48" viewBox="0 0 48 48">
            <circle cx="24" cy="24" r="22" stroke="white" strokeWidth="3" fill="none"/>
            <path d="M2 24 A22 22 0 0 1 46 24" fill="#e3350d"/>
            <line x1="2" y1="24" x2="46" y2="24" stroke="white" strokeWidth="3"/>
            <circle cx="24" cy="24" r="7" fill="white" stroke="white" strokeWidth="2"/>
            <circle cx="24" cy="24" r="4" fill="none" stroke="#aaa" strokeWidth="2"/>
          </svg>
          <div>
            <div className="app-title">PokéBuilder</div>
            <div className="app-subtitle">Team &amp; PC Box Manager · Showdown Export</div>
          </div>
        </div>
      </div>

      <div className="tabs-wrap">
        <div className="tabs-bar">
          {['team','box0','box1','box2'].map((t,i)=>(
            <button key={t} className={`tab-btn${tab===t?' active':''}`} onClick={()=>setTab(t)}>
              {t==='team'?'★ TEAM':`BOX ${i}`}
            </button>
          ))}
        </div>
      </div>

      <div className="app-body">
        <div className="export-bar">
          <button className="btn-export" onClick={()=>setShowExport(true)}>⬆ EXPORT TO SHOWDOWN</button>
        </div>

        {tab==='team' && (
          <>
            <div className="section-title">YOUR TEAM (6)</div>
            <div className="team-grid">
              {team.map((mon,i)=>(
                <SlotCard key={i} mon={mon} idx={i}
                  onView={(m,idx)=>setViewing({mon:m,idx,ctx:'team'})}
                  onEdit={(m,idx)=>setEditing({mon:m,idx,ctx:'team'})}
                  onRemove={idx=>remove(idx,'team')} />
              ))}
            </div>
          </>
        )}

        {boxIdx!==null && (
          <>
            <div className="section-title">BOX {boxIdx+1} — 30 SLOTS</div>
            <div style={{fontSize:'11px',color:'var(--text-muted)',marginBottom:'16px'}}>
              Click to view · Right-click to remove
            </div>
            <div className="box-grid">
              {boxes[boxIdx].map((mon,i)=>(
                <MiniSlot key={i} mon={mon} idx={i}
                  onView={(m,idx)=>setViewing({mon:m,idx,ctx:`box${boxIdx}`})}
                  onEdit={(m,idx)=>setEditing({mon:m,idx,ctx:`box${boxIdx}`})}
                  onRemove={idx=>remove(idx,`box${boxIdx}`)} />
              ))}
            </div>
          </>
        )}
      </div>

      {viewing && (
        <DetailPanel
          mon={viewing.mon}
          onClose={()=>setViewing(null)}
          onEdit={()=>{ setEditing({...viewing}); setViewing(null); }}
          onRemove={()=>remove(viewing.idx, viewing.ctx)}
        />
      )}

      {editing && (
        <PokemonForm initial={editing.mon} onSave={save} onClose={()=>setEditing(null)} />
      )}

      {showExport && (
        <ExportModal text={exportText()} onClose={()=>setShowExport(false)} />
      )}

      {toast && <div className="toast">{toast}</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
